<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#ffffff",
                        "background-dark": "#191919",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Sign In | ExamOrbit</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-x-hidden">
<div class="layout-container flex w-full max-w-[480px] flex-col px-6 py-12">
<div class="flex flex-col items-center gap-6 mb-10">
<div class="flex items-center gap-2 text-primary dark:text-slate-100">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">
                        track_changes
                    </span>
<h1 class="text-2xl font-black leading-tight tracking-tight">ExamOrbit</h1>
</div>
</div>
<div class="w-full rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-8 shadow-sm">
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Sign In</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Enter your credentials to access your dashboard</p>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-900 dark:text-slate-100">Email Address</label>
<input class="form-input w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-3.5 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400" placeholder="name@example.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-slate-900 dark:text-slate-100">Password</label>
<a class="text-xs font-medium text-slate-500 hover:text-primary dark:hover:text-slate-300 transition-colors" href="#">Forgot Password?</a>
</div>
<input class="form-input w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-3.5 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center gap-2 mt-2">
<input class="rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Remember me for 30 days</label>
</div>
<button class="mt-4 w-full rounded-lg bg-primary py-4 text-sm font-bold text-white hover:bg-slate-800 transition-all active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-8 flex flex-col items-center gap-4">
<div class="relative w-full">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-2 text-slate-500">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4 w-full">
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-lg">account_circle</span>
                            Google
                        </button>
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-slate-700 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-lg">cloud</span>
                            Apple
                        </button>
</div>
</div>
</div>
<p class="mt-10 text-center text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="font-bold text-primary dark:text-slate-100 hover:underline" href="#">Create an account</a>
</p>
<footer class="mt-20 flex justify-center gap-6 text-xs text-slate-400">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Help Center</a>
</footer>
</div>
</div>
</body></html>
