<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#ffffff",
                        "background-dark": "#191919",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="w-full border-b border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="text-primary dark:text-white">
<span class="material-symbols-outlined text-3xl leading-none">published_with_changes</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-primary dark:text-white uppercase">ExamOrbit</h1>
</div>
<div class="flex items-center gap-4">
<a class="text-sm font-medium hover:text-primary/70 transition-colors" href="#">Support</a>
<div class="h-8 w-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center overflow-hidden">
<img alt="Profile" class="w-full h-full object-cover" data-alt="User avatar placeholder" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXSNLBk5-uX0EATlff2VL59XVVOTmztHoMZ8E9DWMiDZ35cavqE2kr9FWmQ_vCfmxBbLnlobqRcNZMdXk-MGL39SoDsnHPiiWvUwLAlWDIoJCMQDKnwGqGSxYm7SdIKjcIcwIYYuZiXqf36tsa02HtHarPSLq3P3MrPk7HkjpwM085qNyDCX45Wa6ffiP___oMig4ppzZgj6PfUFdOlw1_vf1bXbavKDm3m4IeuBPzXHZIiZDRvCSrZMdSi_Edu0W7cewcV5_3Ud0"/>
</div>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-6 bg-slate-50/30 dark:bg-background-dark">
<div class="w-full max-w-md">
<!-- Value Proposition -->
<div class="text-center mb-10">
<h2 class="text-3xl font-black tracking-tight text-primary dark:text-white mb-3">Join thousands of aspirants today.</h2>
<p class="text-slate-500 dark:text-slate-400">Create your ExamOrbit account to start your journey.</p>
</div>
<!-- Registration Card -->
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-8 shadow-sm">
<form action="#" class="space-y-5">
<!-- Name Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Full Name</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Password</label>
<div class="relative flex items-center">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400 pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1">Confirm Password</label>
<div class="relative flex items-center">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400 pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full h-12 bg-primary dark:bg-white text-white dark:text-primary font-bold rounded-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-2" type="submit">
                            Create Account
                            <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Already have an account? 
                        <a class="text-primary dark:text-white font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Legal Links -->
<div class="mt-8 flex justify-center gap-6">
<a class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-300" href="#">Terms of Service</a>
<a class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-300" href="#">Privacy Policy</a>
</div>
</div>
</main>
<!-- Simple Footer -->
<footer class="py-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-xs text-slate-400 uppercase tracking-widest font-medium">© 2024 ExamOrbit Inc. All rights reserved.</p>
</footer>
</body></html>
